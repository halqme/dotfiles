name: "Update Flake and Build Test"

on:
  schedule:
    - cron: "0 0 * * 0,4"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/nix-update.yml"

jobs:
  update:
    runs-on: ubuntu-slim
    outputs:
      lockfile_changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v6
      - uses: nixbuild/nix-quick-install-action@v34
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 1G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-last-accessed: P1DT12H
          purge-primary-key: never
      - name: Update flake.lock
        run: nix flake update
      - name: Check if lockfile changed
        id: check
        run: |
          if [ -n "$(git status --porcelain flake.lock)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Upload updated lockfile
        if: steps.check.outputs.changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: flake-lock
          path: flake.lock

  build-test:
    needs: update
    if: needs.update.outputs.lockfile_changed == 'true' || github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: hal
            os: macos-26
            target: .#homeConfigurations.hal.activationPackage
          - name: user
            os: ubuntu-latest
            target: .#homeConfigurations.user.activationPackage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Download updated lockfile
        if: needs.update.outputs.lockfile_changed == 'true'
        uses: actions/download-artifact@v8
        with:
          name: flake-lock

      - uses: nixbuild/nix-quick-install-action@v34
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 1G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-last-accessed: P1DT12H
          purge-primary-key: never

      - name: Build activation package
        run: nix build ${{ matrix.target }} --print-build-logs

  create-pr:
    needs: [update, build-test]
    if: needs.update.outputs.lockfile_changed == 'true' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download updated lockfile
        uses: actions/download-artifact@v8
        with:
          name: flake-lock

      - name: Commit and Push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="nix-flake-update"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$BRANCH_NAME"
          git add flake.lock
          git commit -m "chore(deps): nix flake update"

          git push origin "$BRANCH_NAME" --force-with-lease
      - name: Create or update Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="nix-flake-update"
          PR_TITLE="chore(deps): nix flake update"
          PR_BODY=$(cat <<EOF
          This is an automated PR to update \`flake.lock\`.

          Build Tests:
          - \`hal\` (aarch64-darwin on macos-15): Passed
          - \`suse\` (aarch64-linux on ubuntu-24.04-arm64): Passed
          EOF
          )

          PR_EXISTS=$(gh pr list --head "$BRANCH_NAME" --json number --jq '.[0].number')

          if [ -z "$PR_EXISTS" ]; then
            gh pr create \
              --title "$PR_TITLE" \
              --body "$PR_BODY" \
              --head "$BRANCH_NAME" \
              --base main \
              --label "dependencies,nix"
          else
            gh pr edit "$PR_EXISTS" --title "$PR_TITLE" --body "$PR_BODY"
          fi
